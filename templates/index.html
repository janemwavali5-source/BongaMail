<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Analysis Tool • KSh 5,000</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto mt-8 bg-white rounded-3xl shadow-xl overflow-hidden">

        <!-- Header -->
        <div class="px-8 pt-8 pb-4 border-b flex justify-between items-center">
            <h1 class="text-3xl font-semibold">Email Analysis Tool</h1>
            <div class="text-sm bg-gray-100 px-4 py-2 rounded-2xl font-medium">KSh 5,000 • One-time unlock</div>
        </div>

        {% if message %}
        <div class="mx-8 mt-6 p-4 rounded-2xl bg-blue-50 text-blue-700">{{ message }}</div>
        {% endif %}

        <!-- PAYMENT SECTION -->
        {% if not unlocked %}
        <div class="px-8 py-10">
            <form method="POST" id="pay-form">
                <input type="hidden" name="action" value="pay">
                <label class="block text-sm font-medium mb-2">Your Phone Number</label>
                <input type="tel" name="phone" id="phone" 
                       class="w-full px-5 py-4 text-lg border border-gray-300 rounded-2xl focus:outline-none focus:border-green-500"
                       placeholder="0712345678" required>
                <button type="submit" 
                        class="mt-8 w-full bg-[#00A651] text-white font-semibold py-5 rounded-2xl text-lg flex items-center justify-center gap-2">
                    <i class="fas fa-mobile-alt"></i>
                    Pay KSh 5,000 with M-Pesa
                </button>
            </form>
        </div>
        {% endif %}

        <!-- UNLOCKED ANALYZER -->
        {% if unlocked %}
        <div class="px-8 py-8">
            <h3 class="font-semibold text-xl mb-6">✍️ Compose Your Email</h3>

            <!-- Simple Template Buttons -->
            <div class="mb-8">
                <p class="text-sm font-medium text-gray-600 mb-4">Quick Templates:</p>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <form method="POST" action="/load_template">
                        <input type="hidden" name="template_id" value="0">
                        <button type="submit" 
                                class="w-full text-left p-4 border border-gray-200 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition">
                            <strong>Marketing Offer</strong><br>
                            <small class="text-gray-500">Promote a product or service</small>
                        </button>
                    </form>

                    <form method="POST" action="/load_template">
                        <input type="hidden" name="template_id" value="1">
                        <button type="submit" 
                                class="w-full text-left p-4 border border-gray-200 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition">
                            <strong>Follow-up Email</strong><br>
                            <small class="text-gray-500">Follow up after a meeting</small>
                        </button>
                    </form>

                    <form method="POST" action="/load_template">
                        <input type="hidden" name="template_id" value="2">
                        <button type="submit" 
                                class="w-full text-left p-4 border border-gray-200 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition">
                            <strong>Newsletter</strong><br>
                            <small class="text-gray-500">Monthly update</small>
                        </button>
                    </form>

                    <form method="POST" action="/load_template">
                        <input type="hidden" name="template_id" value="3">
                        <button type="submit" 
                                class="w-full text-left p-4 border border-gray-200 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition">
                            <strong>Thank You</strong><br>
                            <small class="text-gray-500">Thank customer</small>
                        </button>
                    </form>

                    <form method="POST" action="/load_template">
                        <input type="hidden" name="template_id" value="4">
                        <button type="submit" 
                                class="w-full text-left p-4 border border-gray-200 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition">
                            <strong>Invoice Request</strong><br>
                            <small class="text-gray-500">Payment request</small>
                        </button>
                    </form>

                    <form method="POST" action="/load_template">
                        <input type="hidden" name="template_id" value="5">
                        <button type="submit" 
                                class="w-full text-left p-4 border border-gray-200 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition">
                            <strong>Meeting Invitation</strong><br>
                            <small class="text-gray-500">Schedule a call</small>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Compose Form -->
            <form id="analyze-form" method="POST" action="/analyze-email">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Subject</label>
                        <input type="text" name="subject" id="subject" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 text-lg"
                               placeholder="Enter subject line...">

                        <label class="block text-sm font-medium mb-2 mt-6">Email Body</label>
                        <textarea name="body" id="body" rows="12"
                                  class="w-full px-4 py-3 border border-gray-300 rounded-3xl focus:outline-none focus:border-blue-500 resize-y text-base leading-relaxed"
                                  placeholder="Write or edit your email here..."></textarea>

                        <button type="submit" 
                                class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl text-lg">
                            🔍 Analyze Email
                        </button>
                    </div>

                    <div class="bg-gray-50 border border-gray-200 rounded-3xl p-6">
                        <p class="text-xs uppercase text-gray-500 mb-3">Live Preview</p>
                        <div id="live-preview" class="bg-white border border-gray-200 rounded-2xl p-6 min-h-[380px] text-sm leading-relaxed whitespace-pre-wrap">
                            Your email preview will appear here...
                        </div>
                    </div>
                </div>
            </form>
        </div>
        {% endif %}
    </div>

    <script>
        console.log("✅ Simple version loaded - No complex JS");
    </script>
</body> 
</html>
