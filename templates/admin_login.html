<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Bonga Mail</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-semibold text-center mb-6">Admin Login</h2>
        
        {% if error %}
        <div class="bg-red-100 text-red-700 p-3 rounded-2xl mb-4 text-center">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <input type="password" name="password" 
                   class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 mb-4"
                   placeholder="Enter admin password" required>
            <button type="submit" 
                    class="w-full bg-gray-900 text-white py-4 rounded-2xl font-semibold">
                Login to Admin Panel
            </button>
        </form>
    </div>
</body>
</html>
