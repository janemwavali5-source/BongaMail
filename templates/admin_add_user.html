<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manually Unlock User - Bonga Mail</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto mt-16 bg-white rounded-3xl shadow-xl p-10">
        <h2 class="text-2xl font-semibold mb-8 text-center">Manually Unlock User</h2>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Phone Number</label>
                <input type="tel" name="phone" 
                       class="w-full px-5 py-4 border border-gray-300 rounded-2xl text-lg"
                       placeholder="0712345678" required>
            </div>

            <button type="submit" 
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-2xl text-lg">
                Unlock This User
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="/admin" class="text-blue-600 hover:underline">← Back to Admin Dashboard</a>
        </div>
    </div>
</body>
</html>
